name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment:
      name: dev
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to dev
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"

  deploy-qa:
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment:
      name: qa
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to QA
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-qa
    environment:
      name: prod
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to prod
        run: |
          echo "Deploying to ${{ secrets.APP_ENV }}"
          echo "API: ${{ secrets.API_URL }}"